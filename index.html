<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e90ff,#00c6ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:350px;
  text-align:center;
}

select, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button {
  background:#1e90ff;
  color:#fff;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="box">
<h2>تسجيل الدخول</h2>

<select id="role">
<option value="">اختر نوع المستخدم</option>
<option>طالب</option>
<option>معلم</option>
<option>ولي أمر</option>
</select>

<button onclick="login()">تسجيل عبر Google</button>

</div>

<script>
function login(){
  let role = document.getElementById("role").value;

  if(role==""){
    alert("اختار نوع المستخدم الأول");
    return;
  }

  alert("تم تسجيل الدخول كـ " + role);
}
</script>

</body>
</html>
