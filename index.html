<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
</head>

<body style="text-align:center; margin-top:100px; font-family:Arial;">

<h2>تسجيل الدخول</h2>

<input type="email" id="email" placeholder="الإيميل"><br><br>
<input type="password" id="password" placeholder="كلمة المرور"><br><br>

<select id="role">
  <option value="">اختر النوع</option>
  <option value="طالب">طالب</option>
  <option value="معلم">معلم</option>
  <option value="ولي أمر">ولي أمر</option>
</select>

<br><br>

<button onclick="login()">تسجيل الدخول</button>
<button onclick="register()">إنشاء حساب</button>

<script>
// لو المستخدم مسجل قبل كده يدخل علطول
if(localStorage.getItem("loggedIn") === "true"){
  window.location.href = "home.html";
}

// تسجيل حساب جديد
function register(){
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;
  var role = document.getElementById("role").value;

  if(email === "" || password === "" || role === ""){
    alert("املى كل البيانات");
    return;
  }

  localStorage.setItem("email", email);
  localStorage.setItem("password", password);
  localStorage.setItem("role", role);

  alert("تم إنشاء الحساب ✅");
}

// تسجيل الدخول
function login(){
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;

  if(email === localStorage.getItem("email") &&
     password === localStorage.getItem("password")){

    localStorage.setItem("loggedIn","true");
    window.location.href = "home.html";

  } else {
    alert("بيانات غلط ❌");
  }
}
</script>

</body>
</html>
